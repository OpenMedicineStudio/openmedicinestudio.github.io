  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

<a href=\"#scope-safety\" style=\"color:var(--paper);background:var(--sage-deep);text-decoration:none;padding:9px 18px;border-radius:40px;letter-spacing:.14em;\">Enquire<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isMobileNav }}\" hint-placeholder-val=\"{{ false }}\">\n    <button type=\"button\" onclick=\"{{ toggleMenu }}\" aria-label=\"Menu\" style=\"background:none;border:none;padding:8px;cursor:pointer;display:flex;flex-direction:column;gap:5px;\">\n      <span style=\"display:block;width:22px;height:2px;background:var(--ink);\"><\u002Fspan>\n      <span style=\"display:block;width:22px;height:2px;background:var(--ink);\"><\u002Fspan>\n      <span style=\"display:block;width:22px;height:2px;background:var(--ink);\"><\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fsc-if>\n<\u002Fnav>\n\n<!-- MOBILE MENU PANEL -->\n<sc-if value=\"{{ menuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;top:64px;left:0;right:0;z-index:49;background:var(--paper);border-bottom:1px solid var(--line);box-shadow:0 20px 40px -24px rgba(43,42,35,.35);padding:22px clamp(20px,5vw,54px) 28px;display:flex;flex-direction:column;gap:20px;font-size:14px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);\">\n    <a href=\"#programs\" onclick=\"{{ closeMenu }}\" style=\"color:inherit;text-decoration:none;\">Programs<\u002Fa>\n    <a href=\"#journey\" onclick=\"{{ closeMenu }}\" style=\"color:inherit;text-decoration:none;\">The Journey<\u002Fa>\n    <a href=\"#monitoring\" onclick=\"{{ closeMenu }}\" style=\"color:inherit;text-decoration:none;\">Staying With You<\u002Fa>\n    <a href=\"#physician\" onclick=\"{{ closeMenu }}\" style=\"color:inherit;text-decoration:none;\">Physician<\u002Fa>\n    <a href=\"#scope-safety\" onclick=\"{{ closeMenu }}\" style=\"color:inherit;text-decoration:none;\">Scope &amp; Safety<\u002Fa>\n    <a href=\"#scope-safety\" onclick=\"{{ closeMenu }}\" style=\"text-align:center;color:var(--paper);background:var(--sage-deep);text-decoration:none;padding:14px 18px;border-radius:40px;letter-spacing:.14em;\">Enquire<\u002Fa>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- HERO -->\n<header id=\"top\" style=\"position:relative;min-height:100vh;display:flex;align-items:flex-end;\">\n  <x-import component-from-global-scope=\"water-ripple-3\" from=\"9ee09a90-3006-4f0b-9eb8-0ffc4155f7cd#/water-ripple-blue.js\" style=\"position:absolute;inset:0;width:100%;height:100%;\" hint-size=\"100%,100%\"><\u002Fx-import>\n  <div style=\"position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(20,40,52,.30) 0%,rgba(20,40,52,0) 34%,rgba(20,40,52,.12) 62%,rgba(14,28,38,.74) 100%);\"><\u002Fdiv>\n  <div style=\"position:relative;z-index:2;padding:0 clamp(20px,5vw,70px) clamp(52px,7vh,92px);max-width:1120px;pointer-events:none;animation:riseIn 1s ease both;\">\n    <p style=\"font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:rgba(244,241,233,.82);margin:0 0 22px;\">For Salt Spring Island · British Columbia<\u002Fp>\n    <h1 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;font-size:clamp(96px,20vw,280px);line-height:.82;letter-spacing:-.035em;color:#f4f1e9;margin:0 0 0 -.04em;mix-blend-mode:overlay;animation:breathe 9s ease-in-out infinite;\">Fast.<\u002Fh1>\n    <p style=\"margin:30px 0 0;max-width:56ch;font-size:clamp(16px,1.9vw,21px);color:#f6f3ec;font-weight:300;line-height:1.5;\">Water fasting, under medical monitoring.<\u002Fp>\n    <p style=\"margin:14px 0 0;max-width:56ch;font-size:clamp(15px,1.8vw,18px);color:rgba(244,241,233,.82);font-weight:300;line-height:1.6;\">For islanders — quietly from your own home, or in person. Because we're all on the same island, a doctor is never far, and in-person care is close at hand. We stay with you the whole way — from your first blood test to a review the week after you eat again.<\u002Fp>\n    <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin-top:34px;pointer-events:auto;\">\n      <a href=\"#programs\" style=\"font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--forest);background:var(--paper);text-decoration:none;padding:15px 30px;border-radius:44px;\">See the programs<\u002Fa>\n      <a href=\"#scope-safety\" style=\"font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#f6f3ec;text-decoration:none;padding:15px 30px;border-radius:44px;border:1px solid rgba(246,243,236,.55);\">Check eligibility<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- INTRO / CROSSING -->\n<section style=\"padding:clamp(72px,11vh,132px) clamp(20px,5vw,70px);max-width:1180px;margin:0 auto;\">\n  <div style=\"display:grid;gap:clamp(30px,5vw,72px);grid-template-columns:1fr;animation:revealRise .9s cubic-bezier(.22,.61,.36,1) both;animation-timeline:view();animation-range:entry 4% cover 20%;\">\n    <p style=\"font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--sage);margin:0;\">A gentle, guided crossing<\u002Fp>\n    <p style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;font-size:clamp(24px,3.4vw,40px);line-height:1.34;letter-spacing:-.01em;margin:0;max-width:24ch;color:var(--ink);\">A fast is a real shift in the body — crossing from feeding into <span style=\"font-style:italic;color:var(--rust);\">ketosis<\u002Fspan>, and back again when you eat. Our work isn't to make that crossing for you. It's to stay beside you through it, so you always know you are safe.<\u002Fp>\n    <p style=\"font-size:17px;color:var(--ink-soft);max-width:52ch;margin:0;\">We stay with you the whole way — watching the quiet, important moments, and guiding you back to eating when the fast ends.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROGRAMS -->\n<section id=\"programs\" style=\"scroll-margin-top:80px;background:var(--paper-2);padding:clamp(72px,10vh,120px) clamp(20px,5vw,70px);border-top:1px solid var(--line);border-bottom:1px solid var(--line);\">\n  <div style=\"max-width:1240px;margin:0 auto;animation:revealRise .9s cubic-bezier(.22,.61,.36,1) both;animation-timeline:view();animation-range:entry 4% cover 20%;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:clamp(38px,5vw,60px);\">\n      <div>\n        <p style=\"font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--sage);margin:0 0 14px;\">Where we begin<\u002Fp>\n        <h2 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;font-size:clamp(30px,4.4vw,52px);line-height:1.06;letter-spacing:-.01em;margin:0;max-width:16ch;\">Choose the level of care that fits.<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"font-size:15px;color:var(--ink-soft);max-width:38ch;margin:0;\">We're starting simply, and close to home — a short consult, a five-day fast for islanders at home, and longer stays in person on Salt Spring. Each one is watched by a physician, start to finish, with in-person care nearby.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;gap:22px;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));align-items:stretch;\">\n\n      <!-- Tier 1 -->\n      <article style=\"display:flex;flex-direction:column;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:32px 30px 30px;\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:10px;\">\n          <span style=\"font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--sage);\">Assessment<\u002Fspan>\n          <span style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);\">~45 min + labs<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:27px;line-height:1.12;margin:16px 0 8px;\">Consultation &amp; eligibility<\u002Fh3>\n        <p style=\"font-size:14.5px;color:var(--ink-soft);margin:0 0 20px;min-height:44px;\">We begin by getting to know you — your history, your goals, your medications — so we can tell whether a fast is right, and safe, for you now.<\u002Fp>\n        <ul style=\"list-style:none;padding:0;margin:0 0 24px;display:grid;gap:11px;\">\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>A full medical and medication review<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Blood work before any fast begins — done through MSP where medically indicated<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>A medical review to advise whether a fast is suitable for you — a few restrictions apply, listed below<\u002Fli>\n        <\u002Ful>\n        <div style=\"margin-top:auto;padding-top:20px;border-top:1px solid var(--line);\">\n          <div style=\"font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-weight:400;font-size:22px;color:var(--ink);\">A first assessment<\u002Fdiv>\n          <p style=\"font-size:12.5px;color:var(--mut);margin:7px 0 0;\">Where we review your health and blood work, and talk through what a fast would involve.<\u002Fp>\n          <a href=\"#scope-safety\" style=\"display:inline-block;margin-top:20px;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--paper);background:var(--sage-deep);text-decoration:none;padding:13px 24px;border-radius:40px;\">Check eligibility<\u002Fa>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- Tier 2 -->\n      <article style=\"display:flex;flex-direction:column;background:var(--paper);border:1px solid var(--sage-soft);border-radius:18px;padding:32px 30px 30px;box-shadow:0 26px 50px -34px rgba(43,42,35,.5);\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:10px;\">\n          <span style=\"font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--sage);\">At home · where we start<\u002Fspan>\n          <span style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);\">5 days<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:27px;line-height:1.12;margin:16px 0 8px;\">Remote monitored fast<\u002Fh3>\n        <p style=\"font-size:14.5px;color:var(--ink-soft);margin:0 0 20px;min-height:44px;\">A five-day water-only fast at home for island residents, watched every day — with the reassurance that in-person care is close by. Long enough to settle into calm, steady ketosis, and the one offering we're beginning with.<\u002Fp>\n        <ul style=\"list-style:none;padding:0;margin:0 0 24px;display:grid;gap:11px;\">\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Your monitoring kit is delivered in person or by mail, with help getting set up — and picked up or returned by mail when your fast ends<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>A physician checks in and reviews your readings every day<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>We stay closest through the critical shift into ketosis<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>A guided return to eating, and a review the week after<\u002Fli>\n        <\u002Ful>\n        <div style=\"margin-top:auto;padding-top:20px;border-top:1px solid var(--line);\">\n          <div style=\"font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-weight:400;font-size:22px;color:var(--ink);\">Five days, all included<\u002Fdiv>\n          <p style=\"font-size:12.5px;color:var(--mut);margin:7px 0 0;\">Kit delivery and pickup, daily physician monitoring, a guided return to eating, and the week-after review — held together as one.<\u002Fp>\n          <a href=\"#scope-safety\" style=\"display:inline-block;margin-top:20px;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--paper);background:var(--sage-deep);text-decoration:none;padding:13px 24px;border-radius:40px;\">Check eligibility<\u002Fa>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- Tier 3 -->\n      <article style=\"display:flex;flex-direction:column;background:var(--forest);color:#e3ecf2;border:1px solid var(--forest);border-radius:18px;padding:32px 30px 30px;position:relative;overflow:hidden;\">\n        <div style=\"position:absolute;inset:0;pointer-events:none;background:radial-gradient(520px 260px at 88% 0%,rgba(74,110,140,.42),transparent 62%);\"><\u002Fdiv>\n        <div style=\"position:relative;display:flex;align-items:baseline;justify-content:space-between;gap:10px;\">\n          <span style=\"font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--sage-soft);\">In person<\u002Fspan>\n          <span style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(226,236,244,.6);\">7–14 days<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"position:relative;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:27px;line-height:1.12;margin:16px 0 8px;color:#eff4f8;\">In-person monitored fast<\u002Fh3>\n        <p style=\"position:relative;font-size:14.5px;color:rgba(226,236,244,.82);margin:0 0 20px;min-height:44px;\">A longer stay on Salt Spring Island — seven to fourteen days — held in person, with daily on-site monitoring and an unhurried return to eating.<\u002Fp>\n        <ul style=\"position:relative;list-style:none;padding:0;margin:0 0 24px;display:grid;gap:11px;\">\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:rgba(226,236,244,.82);\"><span style=\"position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Daily on-site monitoring, with the same back-up alongside<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:rgba(226,236,244,.82);\"><span style=\"position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Designed with Programme Director Piet&nbsp;Suess<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:rgba(226,236,244,.82);\"><span style=\"position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Time by the water, and space to rest<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:rgba(226,236,244,.82);\"><span style=\"position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>A guided refeed and a one-week review<\u002Fli>\n        <\u002Ful>\n        <div style=\"position:relative;margin-top:auto;padding-top:20px;border-top:1px solid rgba(226,236,244,.2);\">\n          <div style=\"font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-weight:400;font-size:24px;color:#eff4f8;\">Arranged with you<\u002Fdiv>\n          <p style=\"font-size:12.5px;color:rgba(226,236,244,.62);margin:7px 0 0;\">Every in-person stay is different in length and shape, so it is planned together when the time is right.<\u002Fp>\n          <a href=\"#scope-safety\" style=\"display:inline-block;margin-top:20px;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--forest);background:#e3ecf2;text-decoration:none;padding:13px 24px;border-radius:40px;\">Check eligibility<\u002Fa>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- JOURNEY -->\n<section id=\"journey\" style=\"scroll-margin-top:80px;padding:clamp(56px,8vh,96px) clamp(20px,5vw,70px);max-width:1080px;margin:0 auto;animation:revealRise .9s cubic-bezier(.22,.61,.36,1) both;animation-timeline:view();animation-range:entry 4% cover 18%;\">\n  <p style=\"font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--sage);margin:0 0 16px;\">The path<\u002Fp>\n  <h2 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;font-size:clamp(30px,4.4vw,52px);line-height:1.06;letter-spacing:-.01em;margin:0;max-width:18ch;\">From first hello to a week after.<\u002Fh2>\n  <p style=\"font-size:16px;color:var(--ink-soft);max-width:56ch;margin:18px 0 0;\">A fast is a sequence, and breaking it sits in the middle of the path — not at the end. Here is the whole way through, and who walks it with you at each step.<\u002Fp>\n\n  <ol style=\"list-style:none;counter-reset:j;padding:0;margin:44px 0 0;\">\n    <li style=\"position:relative;counter-increment:j;padding:22px 18px 22px 70px;border-top:1px solid var(--line);\"><span style=\"position:absolute;left:14px;top:22px;font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--sage);\">01<\u002Fspan><div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;\"><h4 style=\"font-size:17px;font-weight:500;margin:0;\">Reach out<\u002Fh4><span style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);\">You · via Jane<\u002Fspan><\u002Fdiv><p style=\"margin:5px 0 0;font-size:14px;color:var(--ink-soft);max-width:64ch;\">A short intake questionnaire, kept safely in Jane, tells us a little about you and reaches the studio.<\u002Fp><\u002Fli>\n    <li style=\"position:relative;counter-increment:j;padding:22px 18px 22px 70px;border-top:1px solid var(--line);\"><span style=\"position:absolute;left:14px;top:22px;font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--sage);\">02<\u002Fspan><div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;\"><h4 style=\"font-size:17px;font-weight:500;margin:0;\">Book your consultation<\u002Fh4><span style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);\">Natalie Moore<\u002Fspan><\u002Fdiv><p style=\"margin:5px 0 0;font-size:14px;color:var(--ink-soft);max-width:64ch;\">Natalie reaches out to find a time for you to meet Dr.&nbsp;van der Wart.<\u002Fp><\u002Fli>\n    <li style=\"position:relative;counter-increment:j;padding:22px 18px 22px 70px;border-top:1px solid var(--line);\"><span style=\"position:absolute;left:14px;top:22px;font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--sage);\">03<\u002Fspan><div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;\"><h4 style=\"font-size:17px;font-weight:500;margin:0;\">Consultation &amp; clearance<\u002Fh4><span style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);\">Dr. van der Wart<\u002Fspan><\u002Fdiv><p style=\"margin:5px 0 0;font-size:14px;color:var(--ink-soft);max-width:64ch;\">You meet, set a fast date, arrange your blood work — and your monitoring kit is put in the mail.<\u002Fp><\u002Fli>\n    <li style=\"position:relative;counter-increment:j;padding:22px 18px 22px 70px;border-top:1px solid var(--line);\"><span style=\"position:absolute;left:14px;top:22px;font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--sage);\">04<\u002Fspan><div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;\"><h4 style=\"font-size:17px;font-weight:500;margin:0;\">Your kit arrives<\u002Fh4><span style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);\">You<\u002Fspan><\u002Fdiv><p style=\"margin:5px 0 0;font-size:14px;color:var(--ink-soft);max-width:64ch;\">Everything you need arrives by mail. When it comes, you set it up and run a test reading before the fast starts — so you know it's working and you're connected to the monitoring system.<\u002Fp><\u002Fli>\n    <li style=\"position:relative;counter-increment:j;padding:22px 18px 22px 70px;border-top:1px solid var(--line);\"><span style=\"position:absolute;left:14px;top:22px;font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--sage);\">05<\u002Fspan><div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;\"><h4 style=\"font-size:17px;font-weight:500;margin:0;\">A gentle start<\u002Fh4><span style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);\">Piet Suess<\u002Fspan><\u002Fdiv><p style=\"margin:5px 0 0;font-size:14px;color:var(--ink-soft);max-width:64ch;\">Piet makes sure you're ready — kit working, water well planned — before the first morning.<\u002Fp><\u002Fli>\n    <li style=\"position:relative;counter-increment:j;padding:22px 18px 22px 70px;border-top:1px solid var(--line);\"><span style=\"position:absolute;left:14px;top:22px;font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--sage);\">06<\u002Fspan><div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;\"><h4 style=\"font-size:17px;font-weight:500;margin:0;\">The fast<\u002Fh4><span style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);\">Dr. van der Wart<\u002Fspan><\u002Fdiv><p style=\"margin:5px 0 0;font-size:14px;color:var(--ink-soft);max-width:64ch;\">A calm check-in together each morning, with a private appointment whenever you need one.<\u002Fp><\u002Fli>\n    <li style=\"position:relative;counter-increment:j;padding:22px 18px 22px 70px;background:#e2ebf2;border-radius:12px;margin:3px 0;\"><span style=\"position:absolute;left:14px;top:22px;font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--rust);\">07<\u002Fspan><div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;\"><h4 style=\"font-size:17px;font-weight:500;margin:0;\">Breaking the fast <span style=\"font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--rust);margin-left:6px;\">essential<\u002Fspan><\u002Fh4><span style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);\">Piet Suess<\u002Fspan><\u002Fdiv><p style=\"margin:5px 0 0;font-size:14px;color:var(--ink-soft);max-width:64ch;\">As the fast ends, Piet guides your first meals and hears how it went. Coming back to food slowly is the most important part of the whole path — never to be rushed.<\u002Fp><\u002Fli>\n    <li style=\"position:relative;counter-increment:j;padding:22px 18px 22px 70px;background:#e2ebf2;border-radius:12px;margin:3px 0;\"><span style=\"position:absolute;left:14px;top:22px;font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--rust);\">08<\u002Fspan><div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;\"><h4 style=\"font-size:17px;font-weight:500;margin:0;\">The week-after review <span style=\"font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--rust);margin-left:6px;\">completes the fast<\u002Fspan><\u002Fh4><span style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);\">Dr. van der Wart<\u002Fspan><\u002Fdiv><p style=\"margin:5px 0 0;font-size:14px;color:var(--ink-soft);max-width:64ch;\">Follow-up blood work and a last conversation with Dr.&nbsp;van der Wart, to see how you've settled. This is where the fast truly completes — not when the refeeding starts.<\u002Fp><\u002Fli>\n  <\u002Fol>\n  <p style=\"margin:26px 0 0;font-size:14px;color:var(--ink-soft);padding-left:18px;border-left:2px solid var(--sage-soft);max-width:60ch;\"><strong style=\"font-weight:500;\">In-person fasts<\u002Fstrong> on Salt Spring follow the same care, shaped around you rather than a fixed timeline.<\u002Fp>\n<\u002Fsection>\n\n<!-- MONITORING / STAYING WITH YOU -->\n<section id=\"monitoring\" style=\"scroll-margin-top:80px;background:var(--forest);color:#dde7ee;padding:clamp(64px,9vh,112px) clamp(20px,5vw,70px);position:relative;overflow:hidden;\">\n  <div style=\"position:absolute;top:0;left:0;right:0;height:56px;overflow:hidden;pointer-events:none;opacity:.5;\"><svg viewBox=\"0 0 1400 60\" preserveAspectRatio=\"none\" style=\"width:140%;height:100%;display:block;animation:waterDrift 17s linear infinite;\"><path d=\"M0 30 Q40 16 80 30 T160 30 T240 30 T320 30 T400 30 T480 30 T560 30 T640 30 T720 30 T800 30 T880 30 T960 30 T1040 30 T1120 30 T1200 30 T1280 30 T1360 30 T1440 30\" fill=\"none\" stroke=\"rgba(138,166,181,.6)\" stroke-width=\"1.5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n  <div style=\"position:absolute;inset:0;pointer-events:none;background:radial-gradient(760px 340px at 82% -4%,rgba(74,110,140,.42),transparent 60%);\"><\u002Fdiv>\n  <div style=\"position:relative;max-width:1080px;margin:0 auto;animation:revealRise .9s cubic-bezier(.22,.61,.36,1) both;animation-timeline:view();animation-range:entry 4% cover 20%;\">\n    <p style=\"font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--sage-soft);margin:0 0 16px;\">While you fast<\u002Fp>\n    <h2 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;font-size:clamp(30px,4.4vw,52px);line-height:1.08;letter-spacing:-.01em;margin:0;max-width:20ch;color:#eff4f8;\">A doctor with you, every day.<\u002Fh2>\n    <p style=\"font-size:16px;color:#adbcc8;max-width:62ch;margin:20px 0 0;font-weight:300;\">As you fast, your body changes — moving from using sugar to using fat, and back again when you eat. A doctor checks your results every day and stays close, so you're never doing this on your own. The monitoring simply helps them see how you're doing between calls.<\u002Fp>\n\n    <!-- HOW IT WORKS -->\n    <div style=\"margin-top:clamp(40px,5vw,60px);\">\n      <p style=\"font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--sage-soft);margin:0 0 26px;\">How it works<\u002Fp>\n      <div style=\"position:relative;display:grid;gap:26px;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));\">\n        <div style=\"position:absolute;left:0;right:0;top:8px;height:1px;background:rgba(138,166,181,.28);pointer-events:none;\"><\u002Fdiv>\n        <div style=\"position:relative;\">\n          <div style=\"width:18px;height:18px;border-radius:50%;background:var(--forest);border:2px solid var(--sage-soft);animation:pulseNode 4.5s ease-out infinite;\"><\u002Fdiv>\n          <h4 style=\"font-size:17px;font-weight:500;color:#eff4f8;margin:20px 0 6px;\">We learn your normal<\u002Fh4>\n          <p style=\"font-size:14px;color:#adbcc8;margin:0;line-height:1.6;\">It begins with a reading of what's steady and healthy for you.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"position:relative;\">\n          <div style=\"width:18px;height:18px;border-radius:50%;background:var(--forest);border:2px solid var(--sage-soft);animation:pulseNode 4.5s ease-out infinite 1.5s;\"><\u002Fdiv>\n          <h4 style=\"font-size:17px;font-weight:500;color:#eff4f8;margin:20px 0 6px;\">A doctor checks in daily<\u002Fh4>\n          <p style=\"font-size:14px;color:#adbcc8;margin:0;line-height:1.6;\">Every day of the fast, a doctor reads your results and sees how you're doing.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"position:relative;\">\n          <div style=\"width:18px;height:18px;border-radius:50%;background:var(--sage-soft);border:2px solid var(--sage-soft);animation:pulseNode 4.5s ease-out infinite 3s;\"><\u002Fdiv>\n          <h4 style=\"font-size:17px;font-weight:500;color:#eff4f8;margin:20px 0 6px;\">Someone is always there<\u002Fh4>\n          <p style=\"font-size:14px;color:#adbcc8;margin:0;line-height:1.6;\">If anything needs attention, your doctor is available to you.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PHYSICIAN -->\n<section id=\"physician\" style=\"scroll-margin-top:80px;padding:clamp(64px,9vh,112px) clamp(20px,5vw,70px);max-width:1080px;margin:0 auto;animation:revealRise .9s cubic-bezier(.22,.61,.36,1) both;animation-timeline:view();animation-range:entry 4% cover 18%;\">\n  <div style=\"display:grid;gap:clamp(28px,4vw,54px);grid-template-columns:{{ physicianGridCols }};align-items:start;\">\n    <div style=\"width:100%;max-width:260px;aspect-ratio:3/4;border-radius:16px;overflow:hidden;background:var(--stone);justify-self:start;\"><img src=\"90b3813f-95e0-4c98-844e-c9c118b5f11f\" alt=\"Dr. Riaan van der Wart on Salt Spring Island\" style=\"width:100%;height:100%;object-fit:cover;object-position:24% 24%;display:block;\"><\u002Fdiv>\n    <div>\n      <p style=\"font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--sage);margin:0 0 14px;\">Your physician<\u002Fp>\n      <h2 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:clamp(28px,3.8vw,44px);line-height:1.08;letter-spacing:-.01em;margin:0;\">Dr. Riaan van der Wart<\u002Fh2>\n      <p style=\"font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--sage);margin:10px 0 0;\">Family Physician · CCFP (College of Family Physicians of Canada) · Registered, CPSBC<\u002Fp>\n      <p style=\"font-size:16px;color:var(--ink-soft);max-width:62ch;margin:20px 0 0;\">Dr. van der Wart is a family physician certified by the College of Family Physicians of Canada (CCFP) and registered with the College of Physicians and Surgeons of British Columbia (CPSBC). Based on Salt Spring Island, he provides family medicine and works in emergency medicine settings across the greater Gulf Islands and Vancouver Island. His practice at Open Medicine Studio is within his scope as a family physician; he does not hold a specialist title.<\u002Fp>\n      <p style=\"font-size:16px;color:var(--ink-soft);max-width:62ch;margin:16px 0 0;\">He founded Open Medicine Studio to provide medically monitored fasting under direct physician supervision — from pre-fast assessment and blood work, through the fast itself, to the guided refeed and follow-up review.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TEAM -->\n<section id=\"team\" style=\"scroll-margin-top:80px;padding:clamp(40px,6vh,72px) clamp(20px,5vw,70px) clamp(56px,8vh,96px);max-width:1080px;margin:0 auto;animation:revealRise .9s cubic-bezier(.22,.61,.36,1) both;animation-timeline:view();animation-range:entry 4% cover 18%;\">\n  <p style=\"font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--sage);margin:0 0 14px;\">The team<\u002Fp>\n  <h2 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;font-size:clamp(26px,3.6vw,42px);line-height:1.08;letter-spacing:-.01em;margin:0;max-width:22ch;\">The people who walk it with you.<\u002Fh2>\n  <div style=\"display:grid;gap:22px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));margin-top:34px;\">\n    <article style=\"background:var(--paper-2);border:1px solid var(--line);border-radius:16px;padding:28px 26px;\">\n      <div style=\"width:52px;height:52px;border-radius:50%;background:var(--stone);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--sage-deep);margin-bottom:18px;\">NM<\u002Fdiv>\n      <h3 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:22px;line-height:1.1;margin:0;\">Natalie Moore<\u002Fh3>\n      <p style=\"font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--sage);margin:8px 0 0;\">Office support<\u002Fp>\n      <p style=\"font-size:14px;color:var(--ink-soft);margin:14px 0 0;line-height:1.6;\">Your first point of contact. Natalie helps you find a time to meet Dr.&nbsp;van der Wart and keeps things moving from your first message onward.<\u002Fp>\n    <\u002Farticle>\n    <article style=\"background:var(--paper-2);border:1px solid var(--line);border-radius:16px;padding:28px 26px;\">\n      <div style=\"width:52px;height:52px;border-radius:50%;background:var(--stone);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--sage-deep);margin-bottom:18px;\">PS<\u002Fdiv>\n      <h3 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:22px;line-height:1.1;margin:0;\">Piet Suess<\u002Fh3>\n      <p style=\"font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--sage);margin:8px 0 0;\">Fast program director<\u002Fp>\n      <p style=\"font-size:14px;color:var(--ink-soft);margin:14px 0 0;line-height:1.6;\">Piet makes sure you're ready before the first morning, and guides the return to eating as the fast ends — the part of the path that matters most.<\u002Fp>\n    <\u002Farticle>\n  <\u002Fdiv>\n<\u002Fsection>\n<section style=\"background:var(--paper-2);border-top:1px solid var(--line);padding:clamp(56px,8vh,96px) clamp(20px,5vw,70px);\">\n  <div style=\"max-width:900px;margin:0 auto;animation:revealRise .9s cubic-bezier(.22,.61,.36,1) both;animation-timeline:view();animation-range:entry 4% cover 20%;\">\n    <p style=\"font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--sage);margin:0 0 14px;\">What's included<\u002Fp>\n    <h2 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;font-size:clamp(28px,3.8vw,46px);line-height:1.08;letter-spacing:-.01em;margin:0;max-width:20ch;\">What a fast includes.<\u002Fh2>\n    <p style=\"font-size:16px;color:var(--ink-soft);max-width:60ch;margin:16px 0 0;\">We're beginning with one offering: a five-day remote fast, watched every day. Rather than a menu of packages, it's a single path with everything held together.<\u002Fp>\n\n    <div style=\"margin-top:32px;background:var(--paper);border:1px solid var(--sage-soft);border-radius:20px;padding:clamp(28px,4vw,40px);\">\n      <h3 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:28px;line-height:1.1;margin:0 0 18px;\">Five-day remote monitored fast<\u002Fh3>\n      <ul style=\"list-style:none;padding:0;margin:0;display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));\">\n        <li style=\"position:relative;padding-left:22px;font-size:14.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>The consultation, with blood work through MSP where medically indicated<\u002Fli>\n        <li style=\"position:relative;padding-left:22px;font-size:14.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Your monitoring kit, by mail<\u002Fli>\n        <li style=\"position:relative;padding-left:22px;font-size:14.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Daily physician monitoring through the fast<\u002Fli>\n        <li style=\"position:relative;padding-left:22px;font-size:14.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>A guided return to eating and the week-after review<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:20px;display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));\">\n      <p style=\"font-size:14px;color:var(--ink-soft);margin:0;padding-left:16px;border-left:2px solid var(--sage-soft);line-height:1.6;\">A consultation comes first, where we go over everything together — including what it costs — before you decide. Blood work is done through MSP where medically indicated, at no cost to you.<\u002Fp>\n      <p style=\"font-size:14px;color:var(--ink-soft);margin:0;padding-left:16px;border-left:2px solid var(--sage-soft);line-height:1.6;\"><strong style=\"font-weight:500;color:var(--ink);\">In-person fasts<\u002Fstrong> on Salt Spring run seven to fourteen days, and are arranged individually.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SCOPE & SAFETY (embedded) -->\n<section id=\"scope-safety\" style=\"scroll-margin-top:80px;background:var(--paper);border-top:1px solid var(--line);padding:clamp(64px,9vh,110px) clamp(20px,5vw,70px) clamp(56px,8vh,96px);\">\n  <div style=\"max-width:820px;margin:0 auto;\">\n\n    <p style=\"font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--sage);margin:0 0 18px;\">Scope &amp; Safety<\u002Fp>\n    <h2 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;font-size:clamp(34px,5.4vw,58px);line-height:1.06;letter-spacing:-.02em;margin:0;max-width:16ch;\">How this care is provided.<\u002Fh2>\n    <p style=\"font-size:17px;color:var(--ink-soft);max-width:60ch;margin:22px 0 0;\">Medically monitored fasting is a considered medical service, offered to residents of Salt Spring Island. This section sets out plainly who provides it, what it is and isn't, how we keep you safe, and how your information and fees are handled — so you can decide with a clear picture.<\u002Fp>\n    <p style=\"font-size:12.5px;color:var(--mut);margin:18px 0 0;\">Last updated: July 2026<\u002Fp>\n\n    <div style=\"height:44px;overflow:hidden;opacity:.5;margin:8px 0 0;\"><svg viewBox=\"0 0 1400 44\" preserveAspectRatio=\"none\" style=\"width:140%;height:100%;display:block;animation:waterDrift 19s linear infinite;\"><path d=\"M0 22 Q40 10 80 22 T160 22 T240 22 T320 22 T400 22 T480 22 T560 22 T640 22 T720 22 T800 22 T880 22 T960 22 T1040 22 T1120 22 T1200 22 T1280 22 T1360 22 T1440 22\" fill=\"none\" stroke=\"var(--sage-soft)\" stroke-width=\"1.5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n\n    <div style=\"display:grid;gap:clamp(36px,5vw,52px);margin-top:clamp(28px,4vh,44px);\">\n\n      <!-- 01 -->\n      <section>\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:14px;\"><span style=\"font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--sage);\">01<\u002Fspan><h3 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:clamp(24px,3.2vw,32px);line-height:1.1;margin:0;\">Who provides your care<\u002Fh3><\u002Fdiv>\n        <p style=\"font-size:16px;color:var(--ink-soft);margin:0;max-width:66ch;\">Your care is provided by <strong style=\"font-weight:500;color:var(--ink);\">Dr. Riaan van der Wart<\u002Fstrong>, a family physician certified by the College of Family Physicians of Canada (CCFP) and registered with the College of Physicians and Surgeons of British Columbia (CPSBC). He provides family medicine and works in emergency medicine settings across the greater Gulf Islands and Vancouver Island.<\u002Fp>\n        <p style=\"font-size:16px;color:var(--ink-soft);margin:14px 0 0;max-width:66ch;\">Monitored fasting is offered within his scope as a family physician. He does not hold, and does not claim, a specialist title. Where a concern falls outside family-medicine scope, you will be referred to the appropriate specialist or service in the usual way.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 02 -->\n      <section>\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:14px;\"><span style=\"font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--sage);\">02<\u002Fspan><h3 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:clamp(24px,3.2vw,32px);line-height:1.1;margin:0;\">What this service is — and isn't<\u002Fh3><\u002Fdiv>\n        <div style=\"display:grid;gap:2px;background:var(--line);border:1px solid var(--line);border-radius:14px;overflow:hidden;\">\n          <div style=\"background:var(--paper);padding:22px 24px;\">\n            <p style=\"font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--sage);margin:0 0 8px;\">It is<\u002Fp>\n            <p style=\"font-size:15px;color:var(--ink-soft);margin:0;\">A physician-monitored water fast, with a pre-fast assessment and blood work, daily monitoring through the fast, a guided return to eating, and a follow-up review. A supportive service that runs alongside your existing health care. Daily monitoring is read through a medical-grade wearable using <a href=\"https://junglecode.ca\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--sage-deep);text-decoration:underline;text-underline-offset:3px;\">JungleCode<\u002Fa>, a signal layer developed by Dr. van der Wart to give your physician a clearer, real-time view of how you're doing between check-ins.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:var(--paper);padding:22px 24px;\">\n            <p style=\"font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--rust);margin:0 0 8px;\">It is not<\u002Fp>\n            <p style=\"font-size:15px;color:var(--ink-soft);margin:0;\">A replacement for your family doctor or ongoing medical care. Not an urgent-care or emergency service. Not a guaranteed treatment or cure for any condition — fasting has potential benefits and real risks, and outcomes vary from person to person.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- 03 -->\n      <section>\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:14px;\"><span style=\"font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--sage);\">03<\u002Fspan><h3 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:clamp(24px,3.2vw,32px);line-height:1.1;margin:0;\">Virtual care &amp; staying connected to your own care<\u002Fh3><\u002Fdiv>\n        <p style=\"font-size:16px;color:var(--ink-soft);margin:0;max-width:66ch;\">The fast is offered to residents of Salt Spring Island. Where daily monitoring happens from your own home, it is delivered as virtual care in keeping with the CPSBC Virtual Care practice standard — and because you are on-island, an in-person assessment with Dr. van der Wart is always readily available. Virtual monitoring is a complement to, not a substitute for, in-person and ongoing care.<\u002Fp>\n        <ul style=\"list-style:none;padding:0;margin:18px 0 0;display:grid;gap:12px;\">\n          <li style=\"position:relative;padding-left:24px;font-size:15px;color:var(--ink-soft);max-width:66ch;\"><span style=\"position:absolute;left:2px;top:9px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>If you have a family physician, we can, with your consent, share relevant information so your care stays joined up.<\u002Fli>\n          <li style=\"position:relative;padding-left:24px;font-size:15px;color:var(--ink-soft);max-width:66ch;\"><span style=\"position:absolute;left:2px;top:9px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Because care is island-based, an in-person assessment with Dr. van der Wart can be arranged quickly whenever it's needed.<\u002Fli>\n          <li style=\"position:relative;padding-left:24px;font-size:15px;color:var(--ink-soft);max-width:66ch;\"><span style=\"position:absolute;left:2px;top:9px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Many islanders do not have a family doctor. Monitored fasting is a focused service, not ongoing primary care — for anything outside the fast, we'll point you to the right local resource.<\u002Fli>\n        <\u002Ful>\n      <\u002Fsection>\n\n      <!-- 04 -->\n      <section>\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:14px;\"><span style=\"font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--sage);\">04<\u002Fspan><h3 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:clamp(24px,3.2vw,32px);line-height:1.1;margin:0;\">Eligibility &amp; when we can't proceed<\u002Fh3><\u002Fdiv>\n        <p style=\"font-size:16px;color:var(--ink-soft);margin:0 0 18px;max-width:66ch;\">Whether a fast is suitable is decided individually by Dr. van der Wart at your consultation, after a medical and medication review and blood work. A water-only fast is generally not appropriate where any of the following apply:<\u002Fp>\n        <ul style=\"list-style:none;padding:0;margin:0;display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));\">\n          <li style=\"position:relative;padding-left:22px;font-size:14.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Pregnancy or breastfeeding<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:14.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Type&nbsp;1 diabetes, or type&nbsp;2 on insulin<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:14.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>A current or past eating disorder<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:14.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Advanced kidney, liver, or heart failure<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:14.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Recent heart attack or stroke (within 3 months)<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:14.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Active cancer in treatment<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:14.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Significantly underweight (BMI under 18.5)<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:14.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Uncontrolled thyroid disease, or porphyria<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:14.5px;color:var(--ink-soft);\"><span style=\"position:absolute;left:2px;top:8px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Medications that can't be safely paused or need food<\u002Fli>\n        <\u002Ful>\n        <p style=\"font-size:13.5px;color:var(--mut);margin:18px 0 0;font-style:italic;max-width:66ch;\">This list is a guide, not the whole assessment. The final decision is always made with you, individually, at your consultation.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 05 -->\n      <section>\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:14px;\"><span style=\"font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--sage);\">05<\u002Fspan><h3 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:clamp(24px,3.2vw,32px);line-height:1.1;margin:0;\">Risks &amp; informed consent<\u002Fh3><\u002Fdiv>\n        <p style=\"font-size:16px;color:var(--ink-soft);margin:0;max-width:66ch;\">Fasting can cause light-headedness, low blood pressure, headaches, fatigue, changes in electrolytes and blood sugar, and — less commonly — more serious effects. Before any fast begins, Dr. van der Wart will discuss the potential benefits, the risks, and the alternatives with you, and obtain your written informed consent. You may pause or stop a fast at any time, for any reason.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 06 -->\n      <section>\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:14px;\"><span style=\"font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--sage);\">06<\u002Fspan><h3 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:clamp(24px,3.2vw,32px);line-height:1.1;margin:0;\">Your privacy<\u002Fh3><\u002Fdiv>\n        <p style=\"font-size:16px;color:var(--ink-soft);margin:0;max-width:66ch;\">Your health information is collected, used, and stored confidentially in accordance with British Columbia privacy law. Clinical records are kept in a secure medical records system. Information is shared with your own physician or other providers only with your consent, or where required or permitted by law.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 07 -->\n      <section>\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:14px;\"><span style=\"font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--sage);\">07<\u002Fspan><h3 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:clamp(24px,3.2vw,32px);line-height:1.1;margin:0;\">Fees &amp; what MSP covers<\u002Fh3><\u002Fdiv>\n        <p style=\"font-size:16px;color:var(--ink-soft);margin:0;max-width:66ch;\">Monitored fasting is offered as an <strong style=\"font-weight:500;color:var(--ink);\">uninsured service<\u002Fstrong> — a service that is not a benefit of the BC Medical Services Plan (MSP) — and is paid for privately. Where any part of your care is a medically required, MSP-insured service, that part is billed to MSP, not to you. In particular, the pre-fast <strong style=\"font-weight:500;color:var(--ink);\">blood work is done through MSP where medically indicated<\u002Fstrong>, at no cost to you.<\u002Fp>\n        <div style=\"display:grid;gap:2px;background:var(--line);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-top:20px;\">\n          <div style=\"background:var(--paper);padding:20px 24px;display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;\">\n            <span style=\"font-size:15px;color:var(--ink);\">Remote monitored fast · 5 days<\u002Fspan>\n            <span style=\"font-family:'Cormorant Garamond',Georgia,serif;font-size:20px;color:var(--sage-deep);\">$1,100 CAD<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"background:var(--paper);padding:20px 24px;display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;\">\n            <span style=\"font-size:15px;color:var(--ink);\">In-person, Salt Spring · 7–14 days (clinical fee)<\u002Fspan>\n            <span style=\"font-family:'Cormorant Garamond',Georgia,serif;font-size:20px;color:var(--sage-deep);\">$1,512–$3,024 CAD<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"background:var(--paper);padding:20px 24px;display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;\">\n            <span style=\"font-size:15px;color:var(--ink);\">On-island lodging, per night (optional)<\u002Fspan>\n            <span style=\"font-family:'Cormorant Garamond',Georgia,serif;font-size:20px;color:var(--sage-deep);\">$200–$300 CAD<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:13.5px;color:var(--mut);margin:16px 0 0;max-width:66ch;\">We will always tell you in advance which parts of your care are insured and which are uninsured, and confirm your exact fee, before it is provided. Fees are discussed and confirmed at your consultation.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 08 -->\n      <section style=\"background:var(--forest);color:#dde7ee;border-radius:16px;padding:clamp(26px,4vw,38px);\">\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:12px;\"><span style=\"font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--sage-soft);\">08<\u002Fspan><h3 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:clamp(24px,3.2vw,32px);line-height:1.1;margin:0;color:#eff4f8;\">In an emergency<\u002Fh3><\u002Fdiv>\n        <p style=\"font-size:16px;color:#c3d0da;margin:0;max-width:66ch;\">Open Medicine Studio does not provide urgent or emergency care. If you feel seriously unwell, or think you may be having an emergency, do not wait for a scheduled check-in — contact your local emergency service or <strong style=\"color:#eff4f8;font-weight:500;\">call 911<\u002Fstrong>.<\u002Fp>\n        <p style=\"font-size:15px;color:#c3d0da;margin:14px 0 0;max-width:66ch;\">For concerns related specifically to your fast, Dr. van der Wart is available 24/7 during the fast, virtually or in person, to respond.<\u002Fp>\n      <\u002Fsection>\n\n      <p style=\"font-size:13px;color:var(--mut);line-height:1.7;margin:0;max-width:72ch;\">The information in this section is general and is provided for transparency. It is not medical advice, a diagnosis, or a substitute for a consultation. Whether a fast is suitable for you is determined individually by your physician.<\u002Fp>\n\n      <a href=\"#book\" style=\"justify-self:start;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--paper);background:var(--sage-deep);text-decoration:none;padding:15px 30px;border-radius:44px;\">Continue to consultation<\u002Fa>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CONTACT / FOOTER -->\n<footer id=\"book\" style=\"scroll-margin-top:80px;background:var(--forest);color:#dde7ee;padding:clamp(64px,9vh,110px) clamp(20px,5vw,70px);text-align:center;position:relative;overflow:hidden;\">\n  <div style=\"position:absolute;top:0;left:0;right:0;height:56px;overflow:hidden;pointer-events:none;opacity:.45;\"><svg viewBox=\"0 0 1400 60\" preserveAspectRatio=\"none\" style=\"width:140%;height:100%;display:block;animation:waterDrift 21s linear infinite;\"><path d=\"M0 30 Q40 16 80 30 T160 30 T240 30 T320 30 T400 30 T480 30 T560 30 T640 30 T720 30 T800 30 T880 30 T960 30 T1040 30 T1120 30 T1200 30 T1280 30 T1360 30 T1440 30\" fill=\"none\" stroke=\"rgba(138,166,181,.55)\" stroke-width=\"1.5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n  <p style=\"font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--sage-soft);margin:0 0 16px;\">Book a consult · a first step<\u002Fp>\n  <h3 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;font-size:clamp(28px,4vw,46px);line-height:1.08;margin:0 auto;max-width:18ch;color:#eff4f8;\">Start with a consultation.<\u002Fh3>\n\n  <div style=\"max-width:600px;margin:32px auto 0;text-align:left;\">\n\n    <!-- STEP · TRIAGE -->\n    <sc-if value=\"{{ isTriage }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"background:rgba(255,255,255,.04);border:1px solid rgba(180,198,214,.2);border-radius:18px;padding:clamp(24px,4vw,34px);\">\n        <p style=\"font-size:15px;color:#c3d0da;margin:0;line-height:1.6;\">Water-only fasting has real physiological effects, and it isn't suitable for everyone. Before we book, a quiet first check.<\u002Fp>\n        <p style=\"font-size:14.5px;font-weight:500;color:#eff4f8;margin:20px 0 12px;\">Do any of these apply to you right now?<\u002Fp>\n        <ul style=\"list-style:none;padding:0;margin:0;display:grid;gap:9px;\">\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:#c3d0da;line-height:1.5;\"><span style=\"position:absolute;left:2px;top:7px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Pregnancy, or currently breastfeeding<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:#c3d0da;line-height:1.5;\"><span style=\"position:absolute;left:2px;top:7px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Type&nbsp;1 diabetes, or type&nbsp;2 managed with insulin<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:#c3d0da;line-height:1.5;\"><span style=\"position:absolute;left:2px;top:7px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>A current or past eating disorder<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:#c3d0da;line-height:1.5;\"><span style=\"position:absolute;left:2px;top:7px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Advanced kidney, liver, or heart failure<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:#c3d0da;line-height:1.5;\"><span style=\"position:absolute;left:2px;top:7px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>A heart attack or stroke in the past 3&nbsp;months<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:#c3d0da;line-height:1.5;\"><span style=\"position:absolute;left:2px;top:7px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Active cancer currently in treatment<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:#c3d0da;line-height:1.5;\"><span style=\"position:absolute;left:2px;top:7px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Being significantly underweight (BMI under&nbsp;18.5)<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:#c3d0da;line-height:1.5;\"><span style=\"position:absolute;left:2px;top:7px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Uncontrolled thyroid disease, or porphyria<\u002Fli>\n          <li style=\"position:relative;padding-left:22px;font-size:13.5px;color:#c3d0da;line-height:1.5;\"><span style=\"position:absolute;left:2px;top:7px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sage-soft);\"><\u002Fspan>Medications that cannot be safely paused or require food<\u002Fli>\n        <\u002Ful>\n        <p style=\"font-size:12.5px;color:#93a4b2;margin:18px 0 24px;line-height:1.55;font-style:italic;\">These are the few situations where we can't safely back up a water fast. This is only a first look — Dr.&nbsp;van der Wart makes the final call, gently, at your consultation.<\u002Fp>\n        <div style=\"display:flex;gap:12px;flex-wrap:wrap;\">\n          <button type=\"button\" onclick=\"{{ proceed }}\" style=\"background:var(--sage-soft);color:var(--forest);border:none;font-family:inherit;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;padding:14px 24px;border-radius:40px;cursor:pointer;font-weight:500;\">None of these apply — continue<\u002Fbutton>\n          <button type=\"button\" onclick=\"{{ block }}\" style=\"background:transparent;color:#c3d0da;border:1px solid rgba(180,198,214,.35);font-family:inherit;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;padding:14px 24px;border-radius:40px;cursor:pointer;\">One or more applies to me<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- STEP · BLOCKED -->\n    <sc-if value=\"{{ isBlocked }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:rgba(255,255,255,.04);border:1px solid rgba(180,198,214,.2);border-radius:18px;padding:clamp(24px,4vw,34px);\">\n        <p style=\"font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--rust);margin:0 0 12px;\">Let's pause here<\u002Fp>\n        <h4 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;font-size:26px;line-height:1.12;margin:0;color:#eff4f8;\">Your safety comes first.<\u002Fh4>\n        <p style=\"font-size:15px;color:#c3d0da;margin:14px 0 0;line-height:1.6;\">With any of those, a water-only fast isn't something we can hold safely right now. You're warmly welcome to reach Natalie and talk it through — there may be another way we can help.<\u002Fp>\n        <div style=\"margin-top:20px;\">\n          <div style=\"font-size:15px;font-weight:500;color:#eff4f8;\">Natalie Moore<\u002Fdiv>\n          <a href=\"mailto:info@openmedicinestudio.com\" style=\"color:var(--sage-soft);text-decoration:none;font-size:15px;\">info@openmedicinestudio.com<\u002Fa>\n        <\u002Fdiv>\n        <button type=\"button\" onclick=\"{{ restart }}\" style=\"margin-top:24px;background:transparent;color:#93a4b2;border:none;font-family:inherit;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:4px;\">Back to the check<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- STEP · FORM -->\n    <sc-if value=\"{{ isForm }}\" hint-placeholder-val=\"{{ false }}\">\n      <form onsubmit=\"{{ submit }}\" style=\"background:rgba(255,255,255,.04);border:1px solid rgba(180,198,214,.2);border-radius:18px;padding:clamp(24px,4vw,34px);\">\n        <p style=\"font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--sage-soft);margin:0 0 8px;\">Cleared for consultation<\u002Fp>\n        <p style=\"font-size:15px;color:#c3d0da;margin:0 0 22px;line-height:1.6;\">Tell us how to reach you and Natalie will find a time to meet Dr.&nbsp;van der Wart.<\u002Fp>\n        <div style=\"display:grid;gap:16px;\">\n          <label style=\"display:block;\"><span style=\"font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#93a4b2;\">Full name<\u002Fspan><input type=\"text\" oninput=\"{{ onName }}\" placeholder=\"Your name\" style=\"width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(180,198,214,.24);color:#eff4f8;font-family:inherit;font-size:15px;padding:12px 14px;border-radius:10px;margin-top:6px;\"><\u002Flabel>\n          <label style=\"display:block;\"><span style=\"font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#93a4b2;\">Email<\u002Fspan><input type=\"email\" oninput=\"{{ onEmail }}\" placeholder=\"you@email.com\" style=\"width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(180,198,214,.24);color:#eff4f8;font-family:inherit;font-size:15px;padding:12px 14px;border-radius:10px;margin-top:6px;\"><\u002Flabel>\n          <label style=\"display:block;\"><span style=\"font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#93a4b2;\">Phone <span style=\"text-transform:none;letter-spacing:0;\">(optional)<\u002Fspan><\u002Fspan><input type=\"tel\" oninput=\"{{ onPhone }}\" placeholder=\"Best number to reach you\" style=\"width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(180,198,214,.24);color:#eff4f8;font-family:inherit;font-size:15px;padding:12px 14px;border-radius:10px;margin-top:6px;\"><\u002Flabel>\n          <label style=\"display:block;\"><span style=\"font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#93a4b2;\">Which are you drawn to?<\u002Fspan><sc-raw-select onchange=\"{{ onMode }}\" style=\"width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(180,198,214,.24);color:#eff4f8;font-family:inherit;font-size:15px;padding:12px 14px;border-radius:10px;margin-top:6px;\"><option value=\"\" style=\"color:#1a2e39;\">Select…<\u002Foption><option value=\"Remote monitored fast\" style=\"color:#1a2e39;\">Remote monitored fast<\u002Foption><option value=\"In-person fast on Salt Spring\" style=\"color:#1a2e39;\">In-person fast on Salt Spring<\u002Foption><option value=\"Not sure yet\" style=\"color:#1a2e39;\">Not sure yet<\u002Foption><\u002Fsc-raw-select><\u002Flabel>\n          <label style=\"display:block;\"><span style=\"font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#93a4b2;\">Anything we should know? <span style=\"text-transform:none;letter-spacing:0;\">(optional)<\u002Fspan><\u002Fspan><textarea oninput=\"{{ onNote }}\" rows=\"3\" placeholder=\"Goals, questions, timing…\" style=\"width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(180,198,214,.24);color:#eff4f8;font-family:inherit;font-size:15px;padding:12px 14px;border-radius:10px;margin-top:6px;resize:vertical;\"><\u002Ftextarea><\u002Flabel>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasError }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"font-size:13px;color:#e6a98f;margin:16px 0 0;\">{{ error }}<\u002Fp>\n        <\u002Fsc-if>\n        <div style=\"display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:24px;\">\n          <button type=\"submit\" style=\"background:var(--sage-soft);color:var(--forest);border:none;font-family:inherit;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;padding:14px 26px;border-radius:40px;cursor:pointer;font-weight:500;\">Request my consultation<\u002Fbutton>\n          <button type=\"button\" onclick=\"{{ restart }}\" style=\"background:transparent;color:#93a4b2;border:none;font-family:inherit;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;padding:0;\">Back<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fform>\n    <\u002Fsc-if>\n\n    <!-- STEP · DONE -->\n    <sc-if value=\"{{ isDone }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:rgba(255,255,255,.04);border:1px solid rgba(180,198,214,.2);border-radius:18px;padding:clamp(28px,4vw,38px);text-align:center;\">\n        <div style=\"width:52px;height:52px;border-radius:50%;border:1.5px solid var(--sage-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;\"><svg viewBox=\"0 0 24 24\" width=\"24\" height=\"24\" fill=\"none\" stroke=\"var(--sage-soft)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;font-size:28px;line-height:1.12;margin:0;color:#eff4f8;\">Request received.<\u002Fh4>\n        <p style=\"font-size:15px;color:#c3d0da;margin:14px auto 0;line-height:1.62;max-width:46ch;\"><strong style=\"color:#eff4f8;font-weight:500;\">Natalie Moore<\u002Fstrong> will be in touch to find a time with Dr.&nbsp;van der Wart. Before you meet, <strong style=\"color:#eff4f8;font-weight:500;\">Jane<\u002Fstrong> will send a short questionnaire about your general wellness and health history.<\u002Fp>\n        <a href=\"mailto:info@openmedicinestudio.com\" style=\"display:inline-block;margin-top:18px;color:var(--sage-soft);text-decoration:none;font-size:15px;\">info@openmedicinestudio.com<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n  <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;margin-top:48px;opacity:.7;\">\n    <svg viewBox=\"0 0 100 100\" width=\"24\" height=\"24\" style=\"display:block;flex:none;\" aria-hidden=\"true\"><circle cx=\"50\" cy=\"50\" r=\"40\" fill=\"none\" stroke=\"rgba(180,198,214,.55)\" stroke-width=\"2\"><\u002Fcircle><circle cx=\"50\" cy=\"50\" r=\"5\" fill=\"var(--sage-soft)\"><\u002Fcircle><\u002Fsvg>\n    <span style=\"font-size:13px;letter-spacing:.3em;color:#93a4b2;\">OPEN MEDICINE STUDIO<\u002Fspan>\n  <\u002Fdiv>\n  <p style=\"font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#748899;margin:22px 0 0;\">For Salt Spring Island · British Columbia<\u002Fp>\n  <p style=\"font-size:11.5px;color:#748899;margin:20px auto 0;max-width:74ch;line-height:1.7;font-weight:300;\">Open Medicine Studio provides medically monitored water fasting under the care of Dr. Riaan van der Wart, a family physician registered with the College of Physicians and Surgeons of British Columbia (CPSBC). Care is offered to residents of Salt Spring Island, so that in-person assessment is readily available, in keeping with the CPSBC Virtual Care practice standard. The information on this website is general and is not medical advice, a diagnosis, or a substitute for care from your own physician; no specific result is guaranteed. Whether a fast is suitable is determined individually at a consultation. This is not an urgent-care or emergency service — in an emergency, call 911. Your health information is handled confidentially in accordance with British Columbia privacy law.<\u002Fp>\n<\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { step: 'triage', form: { name: '', email: '', phone: '', mode: '', note: '' }, error: '', isMobile: false, menuOpen: false };\n\n  componentDidMount() {\n    var self = this;\n    this._onResize = function () {\n      var mobile = window.innerWidth < 900;\n      self.setState(function (s) {\n        if (s.isMobile === mobile) return null;\n        return { isMobile: mobile, menuOpen: mobile ? s.menuOpen : false };\n      });\n    };\n    this._onResize();\n    window.addEventListener('resize', this._onResize);\n  }\n\n  componentWillUnmount() {\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n  }\n\n  setField(k, v) {\n    this.setState(function (s) {\n      var f = Object.assign({}, s.form);\n      f[k] = v;\n      return { form: f };\n    });\n  }\n\n  renderVals() {\n    var self = this;\n    var s = this.state;\n    return {\n      isTriage: s.step === 'triage',\n      isBlocked: s.step === 'blocked',\n      isForm: s.step === 'form',\n      isDone: s.step === 'done',\n      error: s.error,\n      hasError: !!s.error,\n      isMobileNav: s.isMobile,\n      isDesktopNav: !s.isMobile,\n      physicianGridCols: s.isMobile ? '1fr' : 'minmax(0,260px) 1fr',\n      menuOpen: s.isMobile && s.menuOpen,\n      toggleMenu: function () { self.setState(function (st) { return { menuOpen: !st.menuOpen }; }); },\n      closeMenu: function () { self.setState({ menuOpen: false }); },\n      proceed: function () { self.setState({ step: 'form', error: '' }); },\n      block: function () { self.setState({ step: 'blocked' }); },\n      restart: function () { self.setState({ step: 'triage', error: '' }); },\n      onName: function (e) { self.setField('name', e.target.value); },\n      onEmail: function (e) { self.setField('email', e.target.value); },\n      onPhone: function (e) { self.setField('phone', e.target.value); },\n      onMode: function (e) { self.setField('mode', e.target.value); },\n      onNote: function (e) { self.setField('note', e.target.value); },\n      submit: function (e) {\n        if (e && e.preventDefault) e.preventDefault();\n        var f = self.state.form;\n        if (!f.name.trim() || !f.email.trim()) {\n          self.setState({ error: 'Please add your name and email so Natalie can reach you.' });\n          return;\n        }\n        self.setState({ step: 'done', error: '' });\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
